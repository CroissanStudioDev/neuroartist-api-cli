name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint (ultracite)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Compile binary smoke
        run: bun run build:bin && ./dist/na --version

  create-release:
    needs: lint-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
                 --title "$tag" --notes "Release $tag"

  release-binaries:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    strategy:
      matrix:
        target:
          - { name: linux-x64, flag: bun-linux-x64, ext: '' }
          - { name: linux-arm64, flag: bun-linux-arm64, ext: '' }
          - { name: darwin-x64, flag: bun-darwin-x64, ext: '' }
          - { name: darwin-arm64, flag: bun-darwin-arm64, ext: '' }
          - { name: windows-x64, flag: bun-windows-x64, ext: .exe }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Compile ${{ matrix.target.name }}
        run: |
          bun build src/index.ts --compile --minify --bytecode \
            --target=${{ matrix.target.flag }} \
            --outfile=dist/na-${{ matrix.target.name }}${{ matrix.target.ext }}

      - name: Package
        run: |
          cd dist
          name="na-${{ matrix.target.name }}${{ matrix.target.ext }}"
          # tar.gz for unix, zip for windows (closer to native conventions)
          if [ "${{ matrix.target.name }}" = "windows-x64" ]; then
            zip -9 "${name%.exe}.zip" "$name"
          else
            tar -czf "$name.tar.gz" "$name"
          fi
          ls -lh

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [ "${{ matrix.target.name }}" = "windows-x64" ]; then
            asset="dist/na-${{ matrix.target.name }}.zip"
          else
            asset="dist/na-${{ matrix.target.name }}.tar.gz"
          fi
          gh release upload "$tag" "$asset" \
            --repo "$GITHUB_REPOSITORY" --clobber
