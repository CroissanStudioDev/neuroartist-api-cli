name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint (ultracite)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Compile binary smoke
        run: bun run build:bin && ./dist/na --version

  release-binaries:
    needs: lint-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    strategy:
      matrix:
        target:
          - { name: linux-x64, flag: bun-linux-x64, ext: '' }
          - { name: linux-arm64, flag: bun-linux-arm64, ext: '' }
          - { name: darwin-x64, flag: bun-darwin-x64, ext: '' }
          - { name: darwin-arm64, flag: bun-darwin-arm64, ext: '' }
          - { name: windows-x64, flag: bun-windows-x64, ext: .exe }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Compile ${{ matrix.target.name }}
        run: |
          bun build src/index.ts --compile \
            --target=${{ matrix.target.flag }} \
            --outfile=dist/na-${{ matrix.target.name }}${{ matrix.target.ext }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/na-${{ matrix.target.name }}${{ matrix.target.ext }}
